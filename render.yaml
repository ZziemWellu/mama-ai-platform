services:
  - type: web
    name: mama-ai-api
    runtime: python
    plan: free
    region: oregon
    rootDir: services/api-gateway
    buildCommand: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: |
      uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.14
      - key: DATABASE_URL
        fromDatabase:
          name: mama-ai-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: False

  - type: web
    name: mama-ai-dashboard
    runtime: python
    plan: free
    region: oregon
    rootDir: apps/dashboard
    buildCommand: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: |
      streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.14
      - key: API_URL
        fromService:
          name: mama-ai-api
          type: web
          property: url

databases:
  - name: mama-ai-db
    plan: free
    region: oregon
    databaseName: mama_ai
    user: mama_ai_user
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all connections
