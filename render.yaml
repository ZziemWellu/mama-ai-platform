services:
  - type: web
    name: mama-ai-api
    runtime: python
    repo: https://github.com/ZziemWellu/mama-ai-platform
    plan: free
    region: frankfurt
    buildCommand: |
      pip install -r services/api-gateway/requirements.txt
    startCommand: |
      cd services/api-gateway && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mama-ai-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        value: https://mama-ai.streamlit.app,https://mama-ai.vercel.app

  - type: web
    name: mama-ai-dashboard
    runtime: python
    repo: https://github.com/ZziemWellu/mama-ai-platform
    plan: free
    region: frankfurt
    buildCommand: |
      cd apps/dashboard && pip install -r requirements.txt
    startCommand: |
      cd apps/dashboard && streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: API_URL
        fromService:
          name: mama-ai-api
          type: web
          property: url

databases:
  - name: mama-ai-db
    plan: free
    databaseName: mama_ai
    region: frankfurt
    ipAllowList:
      - source: 0.0.0.0/0
        description: "Allow all connections"
